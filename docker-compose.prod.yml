services:
  db:
    image: postgres:15-alpine
    container_name: orienteering_db_prod
    restart: always
    env_file:
      - ./db.env.prod
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    environment:
      # Tune Postgres for 8 GB RAM / 4 CPU VPS
      POSTGRES_SHARED_BUFFERS: "512MB"
      POSTGRES_WORK_MEM: "8MB"
      POSTGRES_EFFECTIVE_CACHE_SIZE: "1536MB"
      POSTGRES_MAINTENANCE_WORK_MEM: "128MB"
    command: >
      postgres
      -c shared_buffers=512MB
      -c work_mem=8MB
      -c effective_cache_size=1536MB
      -c maintenance_work_mem=128MB
      -c max_connections=100
      -c idle_in_transaction_session_timeout=30000
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:1.23.1
    container_name: orienteering_pgbouncer_prod
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://admin:CHANGE_ME_DB_PASS@db:5432/orienteering
      AUTH_TYPE: plain
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: 20
      MAX_CLIENT_CONN: 200
      MIN_POOL_SIZE: 5
      RESERVE_POOL_SIZE: 5
      RESERVE_POOL_TIMEOUT: 3
      SERVER_IDLE_TIMEOUT: 600
      IGNORE_STARTUP_PARAMETERS: extra_float_digits
      LISTEN_PORT: 6432
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-p", "6432", "-U", "admin"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M

  backend:
    image: ghcr.io/athamour1/oriento/backend:latest
    container_name: orienteering_backend_prod
    restart: always
    depends_on:
      pgbouncer:
        condition: service_healthy
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env.prod
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/readiness"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    image: ghcr.io/athamour1/oriento/frontend:latest
    container_name: orienteering_frontend_prod
    restart: always
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=https://your-domain.com
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3

  # One-off service for running migrations and seeding before deployment
  # Usage: docker compose -f docker-compose.prod.yml run --rm migrate
  migrate:
    image: ghcr.io/athamour1/oriento/backend:latest
    container_name: orienteering_migrate_prod
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env.prod
    environment:
      # Migrations need direct Postgres (not PgBouncer) for prepared statements
      DATABASE_URL: postgresql://admin:CHANGE_ME_DB_PASS@db:5432/orienteering?schema=public
    command: sh -c "npx prisma migrate deploy && npx ts-node seed.ts"
    profiles:
      - migration

volumes:
  postgres_data_prod:
