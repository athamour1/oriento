services:
  db:
    image: postgres:15-alpine
    container_name: orienteering_db_prod
    restart: always
    env_file:
      - ./db.env.prod
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    environment:
      # Tune Postgres for a small VPS (1-2 GB total RAM)
      POSTGRES_SHARED_BUFFERS: "128MB"
      POSTGRES_WORK_MEM: "4MB"
      POSTGRES_EFFECTIVE_CACHE_SIZE: "256MB"
      POSTGRES_MAINTENANCE_WORK_MEM: "64MB"
    command: >
      postgres
      -c shared_buffers=128MB
      -c work_mem=4MB
      -c effective_cache_size=256MB
      -c maintenance_work_mem=64MB
      -c max_connections=50
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/athamour1/oriento/backend:latest
    container_name: orienteering_backend_prod
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env.prod
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/readiness"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    image: ghcr.io/athamour1/oriento/frontend:latest
    container_name: orienteering_frontend_prod
    restart: always
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=https://your-domain.com
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3

  # One-off service for running migrations and seeding before deployment
  # Usage: docker compose -f docker-compose.prod.yml run --rm migrate
  migrate:
    image: ghcr.io/athamour1/oriento/backend:latest
    container_name: orienteering_migrate_prod
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env.prod
    command: sh -c "npx prisma migrate deploy && npx ts-node seed.ts"
    profiles:
      - migration

volumes:
  postgres_data_prod:
