services:
  db:
    image: postgres:15-alpine
    container_name: orienteering_db_prod
    restart: always
    env_file:
      - ./db.env.prod
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/athamour1/oriento/backend:latest
    container_name: orienteering_backend_prod
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env.prod
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/readiness"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    image: ghcr.io/athamour1/oriento/frontend:latest
    container_name: orienteering_frontend_prod
    restart: always
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=https://your-domain.com
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3

  # One-off service for running migrations and seeding before deployment
  # Usage: docker compose -f docker-compose.prod.yml run --rm migrate
  migrate:
    image: ghcr.io/athamour1/oriento/backend:latest
    container_name: orienteering_migrate_prod
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env.prod
    command: sh -c "npx prisma migrate deploy && npx ts-node seed.ts"
    profiles:
      - migration

volumes:
  postgres_data_prod:
