services:
  db:
    image: postgres:15-alpine
    container_name: orienteering_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: orienteering
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: node:22-alpine
    container_name: orienteering_backend
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://admin:admin123@db:5432/orienteering?schema=public
      - JWT_SECRET=orientiring_dev_secret_key_42_dev
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin123
      - CORS_ORIGIN=http://localhost:9000,http://127.0.0.1:9000,http://localhost:9200,http://127.0.0.1:9200
      - FRONTEND_URL=http://localhost:9000
      - DEFAULT_LANGUAGE=el
    command: sh -c "npm install && npx prisma generate && npx prisma db push && npx ts-node seed.ts && npm run start:dev"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  frontend:
    image: node:22-alpine
    container_name: orienteering_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "9000:9000"
      - "9200:9200"
    environment:
      - VITE_API_URL=http://localhost:3000
      - CHOKIDAR_USEPOLLING=true
    command: sh -c "npm install && npx quasar dev -m pwa -H 0.0.0.0"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules:
